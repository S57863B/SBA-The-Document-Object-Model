<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>personal-blog-sba</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Personal-blog-SBA</h1>
            <p>Publish your thoughts.</p>
        </header>

        <section class="form-section">
            <form id="blog-form">
                <input type="hidden" id="edit-id" value="">
                
                <div class="input-group">
                    <label for="post-title">Title</label>
                    <input type="text" id="post-title" placeholder="Give your post a title...">
                    <span id="title-error" class="error-message"></span>
                </div>

                <div class="input-group">
                    <label for="post-content">Content</label>
                    <textarea id="post-content" rows="5" placeholder="What's on your mind?"></textarea>
                    <span id="content-error" class="error-message"></span>
                </div>

                <div class="button-group">
                    <button type="submit" id="submit-btn">Publish Post</button>
                    <button type="button" id="cancel-edit-btn" class="hidden">Cancel Edit</button>
                </div>
            </form>
        </section>

        <section class="posts-section">
            <h2>Recent Entries</h2>
            <div id="posts-container"></div>
        </section>
    </div>
</body>
</html>
